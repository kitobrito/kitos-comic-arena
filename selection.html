<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naruto-Arena Selection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700&family=Petra&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background">
    <img class="selectionscroll" src="selectionscroll.png" alt="selectionscroll">
    <div class="selectionpage">

        <div class="searching-backdrop hidden">
            <div class="searchingscroll">
                <P class="searching">Searching for an opponent</P>
                <img src="sharingan.png" alt="searchingscroll" class="sharingan">
                <img src="sasukesearch.png" alt="Matchmaking status" class="sasukesearch">
                <button type="submit" class="cancel-button">Cancel</button>
            </div>
        </div>

        <div class="private-match-backdrop hidden">
            <div class="private-match-modal">
                <p class="private-match-title">Enter Opponent Username</p>
                <input type="text" class="private-match-input" maxlength="64" autocomplete="off">
                <p class="private-match-error"></p>
                <button type="button" class="private-match-ok">OK</button>
                <button type="button" class="private-match-cancel">CANCEL</button>
            </div>
        </div>

    <div class="skillviewer collapsed">
    <img class="skillscroll" src="skillscroll.png" alt="selectionscroll">

    <div class="skillpage">

<div class="skill-card">
    <div class="skill-header">
        <div class="character-info">
            <div id="character-name" class="character-name">Select a character</div>
            <img id="character-portrait" src="" alt="Character portrait" class="character-portrait">
        </div>
        <div class="skill-images">
            <img data-skill-index="0" src="" alt="Skill 1" class="skill-image">
            <img data-skill-index="1" src="" alt="Skill 2" class="skill-image">
            <img data-skill-index="2" src="" alt="Skill 3" class="skill-image">
            <img data-skill-index="3" src="" alt="Skill 4" class="skill-image">
        </div>
    </div>
    
    <div class="skill-title-bar">
        <div id="skill-name" class="skill-name">Skill name</div>
        <div class="energy-bar" id="energy-bar">
            <span class="energy-label">ENERGY:</span>
        </div>
    </div>
    
    <div id="skill-description" class="skill-description">
        Choose a character to view skills.
    </div>
    
    <div class="skill-footer">
        <div class="skill-classes" id="skill-classes">
            <span class="classes-label">CLASSES:</span>
        </div>
        <div class="skill-cooldown">
            <span class="cooldown-label">COOLDOWN:</span>
            <span id="skill-cooldown" class="cooldown-value">-</span>
        </div>
    </div>
</div>
        
    </div>

    </div>

<ul class="slot-list"></ul>


<div class="player-card">
    <img src="avatar.jpg" alt="Player Avatar" class="player-avatar">
    <div class="player-infoselection">
        <div class="player-nameselection">Tester</div>
        <div class="player-stat">Academy Student</div>
        <div class="player-stat">CLAN: None</div>
        <div class="player-stat">LEVEL: 1 (0 XP)</div>
        <div class="player-stat">LADDERRANK: 0</div>
        <div class="player-stat">RATIO: 0 - 0 ( + 0)</div>
    </div>
</div>

<ul class="selected-character-slot-list">
    <li class="selected-character-slot">1</li>
    <li class="selected-character-slot">2</li>
    <li class="selected-character-slot">3</li>
</ul>

<div class="button-container">
    <button class="game-button logout-button">
        <img src="logout.png" alt="Logout">
    </button>
    <button class="game-button ladder-button">
        <img src="ladderbutton.png" alt="Start Ladder Game">
    </button>
    <button class="game-button quick-button">
        <img src="quickbutton.png" alt="Start Quick Game">
    </button>
    <button class="game-button private-button">
        <img src="privatebutton.png" alt="Start Private Game">
    </button>
</div>

    </div>
</div>
<script src="characters.js"></script>
<script src="script.js"></script>
</body>
</html>
