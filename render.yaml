services:
  - type: web
    name: naruto-arena
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: naruto-arena
      - key: MONGODB_USERS_COLLECTION
        value: users
      - key: MONGODB_MATCHES_COLLECTION
        value: matches
      - key: MONGODB_APP_STATE_COLLECTION
        value: app_state
      - key: MONGODB_NEWS_POSTS_COLLECTION
        value: news_posts
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 7d
      - key: SESSION_COOKIE_NAME
        value: naruto_session
      - key: SESSION_MAX_AGE_MS
        value: 604800000
      - key: ENABLE_BATTLE_BOTS
        value: "true"
      - key: CORS_ORIGIN
        sync: false
