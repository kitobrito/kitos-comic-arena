<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic-Arena Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700&family=Petra&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
<div class="background">
  <div class="login">
    <p class="logintext">Create your Comic-Arena account to start playing.</p>
    <form class="login-form" novalidate id="register-form">
      <label for="username" class="username-label">Username:</label>
      <input type="text" id="username" name="username" class="username-input" autocomplete="username" required />

      <label for="email" class="password-label">Email:</label>
      <input type="email" id="email" name="email" class="password-input" autocomplete="email" required />

      <label for="password" class="password-label">Password:</label>
      <input type="password" id="password" name="password" class="password-input" autocomplete="new-password" required />

      <label for="confirmPassword" class="password-label">Confirm Password:</label>
      <input type="password" id="confirmPassword" name="confirmPassword" class="password-input" autocomplete="new-password" required />

      <button type="submit" class="ok-button" id="register-button">Create Account</button>
      <a class="ok-button" href="selection-login.html" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;">Back to Sign In</a>
      <div class="login-status" role="status" aria-live="polite" id="register-status"></div>
    </form>
  </div>
</div>
<script src="scripts/register.js"></script>
</body>
</html>
